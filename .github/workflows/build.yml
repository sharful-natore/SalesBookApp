name: Android Clean Build Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Compile App APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Debug APK
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ ! -z "$GRADLEW_PATH" ]; then
            PROJECT_DIR=$(dirname "$GRADLEW_PATH")
            echo "Found gradlew in $PROJECT_DIR. Starting build..."
            cd "$PROJECT_DIR"
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
          else
            echo "Gradlew not found, trying global gradle..."
            gradle assembleDebug --no-daemon
          fi

      - name: Upload Compiled APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sales-Book-App-APK
          path: "**/build/outputs/apk/debug/app-debug.apk"
          if-no-files-found: error
